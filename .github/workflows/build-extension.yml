name: Build Komga-Gorse Extension APK

on:
  push:
    paths:
      - 'komgagorse-extension/**'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout komga repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Clone extensions-source
        run: |
          git clone --depth 1 https://github.com/keiyoushi/extensions-source.git /tmp/extensions-source

      - name: Copy extension source
        run: |
          cp -r komgagorse-extension /tmp/extensions-source/src/all/komgagorse

      - name: Build APK
        working-directory: /tmp/extensions-source
        run: |
          chmod +x gradlew
          ./gradlew :src:all:komgagorse:assembleDebug

      - name: Find and copy APK
        run: |
          APK_PATH=$(find /tmp/extensions-source/src/all/komgagorse/build -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_PATH"
          mkdir -p repo/apk
          cp "$APK_PATH" repo/apk/tachiyomi-all.komga-gorse-v1.apk

      - name: Commit and push APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/apk/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: 自动构建 komga-gorse 扩展 APK"
            git push
          fi
