name: Build Komga-Gorse Extension APK

on:
  push:
    paths:
      - 'komgagorse-extension/**'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout komga repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Clone extensions-source
        run: |
          git clone --depth 1 https://github.com/keiyoushi/extensions-source.git /tmp/extensions-source

      - name: Copy extension source
        run: |
          cp -r komgagorse-extension /tmp/extensions-source/src/all/komgagorse

      - name: Generate signing key
        run: |
          keytool -genkeypair \
            -alias komga-gorse \
            -keypass android \
            -keystore /tmp/signingkey.jks \
            -storepass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Komga Gorse, OU=Extensions, O=KomgaGorse, L=Unknown, ST=Unknown, C=US"

      - name: Build APK (Release)
        working-directory: /tmp/extensions-source
        env:
          ALIAS: komga-gorse
          KEY_STORE_PASSWORD: android
          KEY_PASSWORD: android
        run: |
          cp /tmp/signingkey.jks signingkey.jks
          chmod +x gradlew
          ./gradlew :src:all:komgagorse:assembleRelease

      - name: Create repo structure
        run: |
          mkdir -p repo/apk repo/icon

          # Find and copy APK
          APK_PATH=$(find /tmp/extensions-source/src/all/komgagorse/build -name "*-release.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find /tmp/extensions-source/src/all/komgagorse/build -name "*.apk" -not -name "*-unsigned*" -type f | head -1)
          fi
          echo "Found APK: $APK_PATH"

          APK_FILENAME="tachiyomi-all.komga-gorse-v1.0.apk"
          cp "$APK_PATH" "repo/apk/${APK_FILENAME}"

          # Extract metadata using aapt
          AAPT=$(find $ANDROID_HOME/build-tools -name "aapt" | sort -r | head -1)
          APK_FILE="repo/apk/${APK_FILENAME}"
          BADGING=$($AAPT dump --include-meta-data badging "$APK_FILE")

          PKG_NAME=$(echo "$BADGING" | grep "^package:" | sed "s/.*name='\([^']*\)'.*/\1/")
          VERSION_CODE=$(echo "$BADGING" | grep "^package:" | sed "s/.*versionCode='\([^']*\)'.*/\1/")
          VERSION_NAME=$(echo "$BADGING" | grep "^package:" | sed "s/.*versionName='\([^']*\)'.*/\1/")
          APP_LABEL=$(echo "$BADGING" | grep "^application-label:" | sed "s/application-label:'\([^']*\)'/\1/")
          NSFW=$(echo "$BADGING" | grep "tachiyomi.extension.nsfw" | sed "s/.*value='\([^']*\)'.*/\1/")
          ICON_PATH=$(echo "$BADGING" | grep "^application-icon-320:" | sed "s/application-icon-320:'\([^']*\)'/\1/")

          echo "Package: $PKG_NAME"
          echo "Version: $VERSION_NAME ($VERSION_CODE)"
          echo "Label: $APP_LABEL"
          echo "NSFW: ${NSFW:-0}"

          # Extract icon
          if [ -n "$ICON_PATH" ]; then
            unzip -jo "$APK_FILE" "$ICON_PATH" -d /tmp/icon_tmp/ 2>/dev/null || true
            ICON_FILE=$(basename "$ICON_PATH")
            cp "/tmp/icon_tmp/$ICON_FILE" "repo/icon/${PKG_NAME}.png" 2>/dev/null || true
          fi

          # Generate signing key fingerprint for repo.json
          FINGERPRINT=$(keytool -printcert -jarfile "$APK_FILE" 2>/dev/null | grep "SHA-256" | sed 's/.*SHA-256: //' | tr -d ':' | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          echo "Signing fingerprint: $FINGERPRINT"

          # Generate index.min.json and repo.json
          python3 << PYEOF
          import json, hashlib, struct

          def compute_source_id(name, lang, version_id):
              """Compute Tachiyomi source ID the same way as HttpSource.id"""
              key = f"{name.lower()}/{lang}/{version_id}"
              md5 = hashlib.md5(key.encode("utf-8")).digest()
              return str(struct.unpack(">q", md5[:8])[0])

          # Source names match KomgaGorseFactory output
          sources = [
              {"name": "Komga Gorse", "lang": "all", "id": compute_source_id("Komga Gorse", "all", 1), "baseUrl": ""},
              {"name": "Komga Gorse (2)", "lang": "all", "id": compute_source_id("Komga Gorse (2)", "all", 1), "baseUrl": ""},
              {"name": "Komga Gorse (3)", "lang": "all", "id": compute_source_id("Komga Gorse (3)", "all", 1), "baseUrl": ""},
          ]

          entry = {
              "name": "${APP_LABEL}",
              "pkg": "${PKG_NAME}",
              "apk": "${APK_FILENAME}",
              "lang": "all",
              "code": int("${VERSION_CODE}"),
              "version": "${VERSION_NAME}",
              "nsfw": int("${NSFW}" or "0"),
              "sources": sources,
          }

          with open("repo/index.min.json", "w") as f:
              json.dump([entry], f, ensure_ascii=False, separators=(",", ":"))

          print("Generated index.min.json:")
          print(json.dumps([entry], indent=2))

          # Generate repo.json
          repo_meta = {
              "meta": {
                  "name": "Komga Gorse",
                  "website": "https://github.com/maolei1024/komga",
                  "signingKeyFingerprint": "${FINGERPRINT}"
              }
          }
          with open("repo/repo.json", "w") as f:
              json.dump(repo_meta, f, ensure_ascii=False, separators=(",", ":"))

          print("Generated repo.json:")
          print(json.dumps(repo_meta, indent=2))
          PYEOF

          echo "Final repo structure:"
          find repo/ -type f

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: 构建 komga-gorse 扩展（含签名和元数据）"
            git push
          fi
