# 矩阵多架构原生构建 (PUBLIC 仓库，添加 owner 限制)
matrix:
  ARCH:
    - amd64
    - arm64
labels:
  arch: ${ARCH}
when:
  - event: push
    branch: master
    evaluate: 'CI_REPO_OWNER == "maolei1024"'
steps:
  # Gradle 预构建 (需要 JDK 21+ 和 Node.js)
  - name: gradle-build
    image: eclipse-temurin:21-jdk
    commands:
      - 'apt-get update && apt-get install -y curl && curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs'
      - chmod +x ./gradlew
      - './gradlew :komga:prepareThymeLeaf :komga:bootJar --no-daemon'

  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: docker.nexus.ixuni.win/komga
      registry: docker.nexus.ixuni.win
      tags: "${CI_PIPELINE_NUMBER}-${ARCH}"
      platforms: "linux/${ARCH}"
      username:
        from_secret: nexus_username
      password:
        from_secret: nexus_password

